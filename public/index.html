<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JRNL · Sign in</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%231a1a1a'/%3E%3Cpath fill-rule='evenodd' fill='%23E85A1A' d='M50 14 L86 50 L50 86 L14 50 Z M50 33 L33 50 L50 67 L67 50 Z'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#1a1a1a;--surface:#242424;--surface-2:#2c2a27;--line:#3a3733;--line-strong:#4a463f;
    --txt:#ECE8E3;--txt-2:#9a9389;--txt-3:#6b655c;--accent:#E85A1A;
    --disp:"Barlow Condensed",sans-serif;--body:"Barlow",sans-serif;--mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);color:var(--txt);font-family:var(--body);
    -webkit-font-smoothing:antialiased;line-height:1.5;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:32px 20px;position:relative;overflow:hidden;
  }
  ::selection{background:var(--accent);color:#fff;}

  /* field-instrument corner ticks */
  .corner{position:fixed;width:18px;height:18px;border:1px solid var(--line-strong);pointer-events:none;}
  .corner.tl{top:20px;left:20px;border-right:none;border-bottom:none;}
  .corner.tr{top:20px;right:20px;border-left:none;border-bottom:none;}
  .corner.bl{bottom:20px;left:20px;border-right:none;border-top:none;}
  .corner.br{bottom:20px;right:20px;border-left:none;border-top:none;}
  .stamp{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--txt-3);text-transform:uppercase;white-space:nowrap;}

  .panel{width:100%;max-width:340px;}
  @media(prefers-reduced-motion:no-preference){
    .panel.in{animation:rise .5s cubic-bezier(.2,.7,.2,1);}
  }
  @keyframes rise{from{transform:translateY(14px);}to{transform:none;}}

  /* logo lockup */
  .logo{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:30px;}
  .logo .mark{width:58px;height:58px;fill:var(--accent);}
  .logo .word{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:46px;line-height:.9;margin-top:18px;}
  .logo .sub{font-family:var(--mono);font-size:10px;letter-spacing:.26em;color:var(--txt-3);text-transform:uppercase;margin-top:8px;white-space:nowrap;}

  /* loading state */
  .loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:8px 0 4px;}
  .loadbar{width:160px;height:3px;background:var(--surface);overflow:hidden;position:relative;}
  .loadbar i{position:absolute;top:0;bottom:0;width:40%;background:var(--accent);
    animation:sweep 1.05s cubic-bezier(.5,0,.5,1) infinite;}
  @keyframes sweep{0%{left:-40%;}100%{left:100%;}}
  .loading .lt{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--txt-2);text-transform:uppercase;white-space:nowrap;}

  /* auth */
  .auth{display:none;flex-direction:column;gap:10px;}
  .status{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:18px;}
  .status .dot{width:7px;height:7px;border-radius:50%;background:#7e9b6a;box-shadow:0 0 0 3px rgba(126,155,106,.16);animation:blink 1.6s steps(2,start) infinite;}
  @keyframes blink{50%{opacity:.4;}}
  .status .st{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--txt-2);text-transform:uppercase;white-space:nowrap;}

  label.fld{font-family:var(--disp);font-weight:600;letter-spacing:.12em;text-transform:uppercase;font-size:11px;color:var(--txt-2);margin-bottom:-2px;}
  input[type=email]{
    width:100%;background:var(--surface);border:1px solid var(--line);color:var(--txt);
    font-family:var(--mono);font-size:14px;padding:14px;transition:border-color .16s ease;
  }
  input[type=email]:focus{outline:none;border-color:var(--accent-dim,#b8480f);}
  input[type=email]::placeholder{color:var(--txt-3);}

  .btn{
    appearance:none;cursor:pointer;width:100%;border:1px solid var(--line);background:var(--surface);
    color:var(--txt);font-family:var(--disp);font-weight:600;letter-spacing:.1em;text-transform:uppercase;
    font-size:15px;padding:14px;display:flex;align-items:center;justify-content:center;gap:10px;
    transition:all .16s ease;
  }
  .btn:hover{border-color:var(--line-strong);background:var(--surface-2);}
  .btn:active{transform:translateY(1px);}
  .btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn.primary:hover{background:#ff6a26;border-color:#ff6a26;}
  .btn.primary svg{stroke:#fff;}
  .btn .spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;}
  @keyframes rot{to{transform:rotate(360deg);}}

  .or{display:flex;align-items:center;gap:12px;margin:6px 0;font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--txt-3);text-transform:uppercase;}
  .or::before,.or::after{content:"";flex:1;height:1px;background:var(--line);}

  .legal{font-family:var(--body);font-size:11.5px;color:var(--txt-3);text-align:center;line-height:1.55;margin-top:18px;}
  .legal a{color:var(--txt-2);text-decoration:none;border-bottom:1px solid var(--line-strong);}
  .legal a:hover{color:var(--txt);}
</style>
</head>
<body>
  <span class="corner tl"></span><span class="corner tr"></span>
  <span class="corner bl"></span><span class="corner br"></span>

  <div class="panel" id="panel">
    <div class="logo">
      <svg class="mark" viewBox="0 0 100 100" aria-hidden="true"><path fill-rule="evenodd" d="M50 8 L92 50 L50 92 L8 50 Z M50 30 L30 50 L50 70 L70 50 Z"></path></svg>
      <div class="word">JRNL</div>
      <div class="sub">Training Journal</div>
    </div>

    <div class="loading" id="loading">
      <div class="loadbar"><i></i></div>
      <div class="lt">Initializing…</div>
    </div>

    <div class="auth" id="auth">
      <div class="status"><span class="dot"></span><span class="st">System ready</span></div>

      <label class="fld" for="email">Athlete ID</label>
      <input type="email" id="email" placeholder="you@email.com" />
      <button class="btn primary" id="continueBtn">
        <span class="lbl">Continue</span>
        <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>

      <div class="or">or</div>

      <button class="btn" data-go>
        <svg viewBox="0 0 24 24"><path d="M12 4a8 8 0 0 0-8 8v3M8 12a4 4 0 0 1 8 0v6M12 12v7M20 12a8 8 0 0 0-2.8-6.1"/></svg>
        Use a passkey
      </button>
      <button class="btn" data-go>
        <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="13" rx="2"/><path d="M4 8l8 5 8-5M8 21l4-4"/></svg>
        Sign in with a magic link
      </button>

      <div class="legal">
        By continuing you agree to the <a href="#">Training Terms</a> &amp; <a href="#">Privacy</a>.
      </div>
    </div>
  </div>

  <div class="stamp">JRNL v1.0 · Field Log</div>

<script>
  const panel=document.getElementById('panel');
  const loading=document.getElementById('loading');
  const auth=document.getElementById('auth');

  // loading beat → reveal sign-in (JS-driven so it never depends on a CSS animation finishing)
  setTimeout(()=>{
    loading.style.display='none';
    auth.style.display='flex';
    panel.classList.add('in');
    panel.classList.remove('in'); void panel.offsetWidth; panel.classList.add('in');
  },1350);

  function enterApp(){ window.location.href='app.html'; }

  const cont=document.getElementById('continueBtn');
  cont.addEventListener('click',()=>{
    if(cont.classList.contains('busy'))return;
    cont.classList.add('busy');
    cont.innerHTML='<span class="spin"></span>';
    setTimeout(enterApp,750);
  });
  document.querySelectorAll('[data-go]').forEach(b=>b.addEventListener('click',()=>setTimeout(enterApp,250)));
  document.getElementById('email').addEventListener('keydown',e=>{if(e.key==='Enter')cont.click();});
</script>
</body>
</html>
